apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: {{ .Values.routing.host }}
      http:
        paths:
          - path: {{ .Values.routing.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}-svc
                port:
                  number: {{ .Values.app.port }}
