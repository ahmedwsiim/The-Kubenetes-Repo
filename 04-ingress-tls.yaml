# ---------------------------------------------------------------------------
# 26b) Same ingress as 02-ingress.yaml, but with TLS via cert-manager.
# Apply this INSTEAD of 02-ingress.yaml once cert-manager + the
# ClusterIssuer (03-cluster-issuer.yaml) are in place.
# Replace app.yourdomain.com with your real domain/subdomain.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thechamp.app
      secretName: myapp-tls
  rules:
    - host: thechamp.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myapp-svc
                port:
                  number: 80
