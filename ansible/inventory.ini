### e:/K8s/ansible/inventory.ini
[bastion]
localhost ansible_connection=local

[control_plane]
10.0.10.22 ansible_host=10.0.10.22 control_plane_ip=10.0.10.22

[workers]
10.0.10.129 ansible_host=10.0.10.129
10.0.20.70 ansible_host=10.0.20.70

