### e:/K8s/ansible/inventory.ini
[bastion]
localhost ansible_connection=local

[control_plane]
10.0.10.X   # Replace with Terraform output: control_plane_private_ip

[workers]
10.0.10.Y   # Replace with Terraform output: worker_1_private_ip
10.0.20.Z   # Replace with Terraform output: worker_2_private_ip

[k8s_cluster:children]
control_plane
workers

[all:vars]
ansible_user = ubuntu
ansible_ssh_private_key_file = ~/.ssh/k8s-kubeadm.pem
ansible_ssh_common_args = '-o StrictHostKeyChecking=no'
