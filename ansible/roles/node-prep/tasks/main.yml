### e:/K8s/ansible/roles/node-prep/tasks/main.yml
---
# Disable swap immediately for Kubernetes
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  become: true
  changed_when: false

# Remove swap from fstab so it doesn't remount on reboot
- name: Remove swap entry from /etc/fstab permanently
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '#\1'
  become: true

# Configure required kernel modules for containerd
- name: Load kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
  become: true

# Load overlay module into kernel
- name: Load overlay module immediately
  ansible.builtin.command: modprobe overlay
  become: true
  changed_when: false

# Load br_netfilter module into kernel
- name: Load br_netfilter module immediately
  ansible.builtin.command: modprobe br_netfilter
  become: true
  changed_when: false

# Configure required sysctl parameters for Kubernetes
- name: Configure sysctl
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
  become: true

# Apply sysctl parameters
- name: Apply sysctl settings immediately
  ansible.builtin.command: sysctl --system
  become: true
  changed_when: false

# Install packages required for kubeadm and containerd
- name: Install prerequisite packages (apt)
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - apt-transport-https
      - gpg
    state: present
    update_cache: true
  become: true

# Create directory for apt keyrings
- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

# Download and add Docker's GPG key
- name: Add Docker GPG key for containerd repo
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  become: true

# Add Docker's apt repository
- name: Add Docker apt repository for containerd
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable"
    state: present
  become: true

# Install containerd package
- name: Install containerd.io
  ansible.builtin.apt:
    name: containerd.io
    state: present
    update_cache: true
  become: true

# Generate the default containerd configuration
- name: Generate default containerd config
  ansible.builtin.command: containerd config default
  register: containerd_default_config
  become: true
  changed_when: false

# Write the default containerd configuration to file
- name: Write containerd config to /etc/containerd/config.toml
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_default_config.stdout }}"
  become: true
  notify: restart containerd

# Enable SystemdCgroup in containerd config for Kubernetes
- name: Set SystemdCgroup = true in containerd config
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  become: true
  notify: restart containerd

# Ensure containerd is enabled and started
- name: Enable and start containerd service
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: restarted
  become: true

# Download and add Kubernetes GPG key
- name: Add Kubernetes apt GPG key
  ansible.builtin.shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  become: true

# Add Kubernetes apt repository
- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    state: present
  become: true

# Install kubeadm, kubelet, and kubectl
- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.apt:
    name:
      - "kubeadm={{ kubernetes_version }}.*"
      - "kubelet={{ kubernetes_version }}.*"
      - "kubectl={{ kubernetes_version }}.*"
    state: present
    update_cache: true
  become: true

# Hold Kubernetes packages at their current version to prevent accidental upgrades
- name: Hold kubeadm, kubelet, kubectl at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl
  become: true

# Ensure kubelet service is enabled
- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
  become: true
