### e:/K8s/ansible/roles/traefik/tasks/main.yml
---
# Create the namespace for Traefik
- name: Create traefik namespace
  ansible.builtin.command: kubectl create namespace {{ traefik_namespace }}
  ignore_errors: true
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Add the Traefik Helm repository
- name: Add Traefik Helm repo
  ansible.builtin.command: helm repo add traefik https://traefik.github.io/charts
  ignore_errors: true
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Update Helm repositories
- name: Update Helm repos
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Check if Traefik is already installed
- name: Check if Traefik is already installed
  ansible.builtin.command: helm status traefik -n {{ traefik_namespace }}
  register: traefik_installed
  ignore_errors: true
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Write Traefik Helm values file to control plane
- name: Write Traefik Helm values file
  ansible.builtin.copy:
    dest: /tmp/traefik-values.yaml
    content: |
      deployment:
        kind: DaemonSet

      image:
        tag: "{{ traefik_image_tag }}"

      service:
        enabled: true
        type: ClusterIP

      ports:
        web:
          port: 80
          hostPort: 80
        websecure:
          port: 443
          hostPort: 443
        traefik:
          port: 9000
          hostPort: 9000
          expose:
            default: true

      providers:
        kubernetesIngress:
          enabled: true
        kubernetesCRD:
          enabled: false

      ingressClass:
        enabled: true
        isDefaultClass: true

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist

      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "300m"
          memory: "128Mi"

      logs:
        general:
          level: INFO

      accessLogs:
        enabled: true

# Install Traefik via Helm using values file
- name: Install Traefik via Helm as DaemonSet
  ansible.builtin.command: >
    helm install traefik traefik/traefik
    --namespace {{ traefik_namespace }}
    --version {{ traefik_chart_version }}
    --values /tmp/traefik-values.yaml
  when: traefik_installed.rc != 0
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Wait for Traefik DaemonSet pods to be Ready
- name: Wait for Traefik DaemonSet pods to be Ready
  ansible.builtin.command: kubectl wait --for=condition=Ready pods -l app.kubernetes.io/name=traefik -n {{ traefik_namespace }} --timeout=120s
  retries: 6
  delay: 20
  register: traefik_ready
  until: traefik_ready.rc == 0
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

# Verify Traefik DaemonSet status
- name: Verify Traefik DaemonSet is running on all worker nodes
  ansible.builtin.command: kubectl get daemonset traefik -n {{ traefik_namespace }}
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: traefik_ds

# Print the Traefik DaemonSet status
- name: Print Traefik DaemonSet status
  ansible.builtin.debug:
    msg: "{{ traefik_ds.stdout }}"
